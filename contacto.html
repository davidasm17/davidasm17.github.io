<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Contacto - Barberia Alura</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css"> </head>

<body>

    <header>
        <div class="caja">

            <h1><img src="images/logo.png" alt="Logo Alura"></h1>

            <nav>

                <ul class="navegacion">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="productos.html">Productos</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>

        </div>
        </nav>
    </header>

    <main>

        <form>
            <label for="nombreapellido">Nombre y apellido</label>
            <input type="text" id="nombreapellido" class="input-padron" required>

            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" class="input-padron" required placeholder="email@dominio.com">

            <label for="telefono">Telefóno</label>
            <input type="tel" id="telefono" class="input-padron" required placeholder="(XX) XXXX XXXX">

            <label for="mensaje">Mensaje</label>
            <textarea cols="70" rows="10" id="mensaje" class="input-padron" required></textarea>

            <fieldset>
                <legend>Cómo le gustaria ser contactado?</legend>

                <label for="radio-email"><input type="radio" name="contacto" value="email" id="radio-email">Email</label>


                <label for="radio-whatsapp"><input type="radio" name="contacto" value="whatsapp" id="radio-whatsapp" checked
                    >Whatsapp</label>


                <label for="radio-telefono"><input type="radio" name="contacto" value="telefono" id="radio-telefono">
                    Telefóno</label>



            </fieldset>
            <fieldset>
                <legend>En cual horario prefiere ser tendido?</legend>
                <select>
                <option>Mañana</option>
                <option>Tarde</option>
                <option>Noche</option>


            </select>


            </fieldset>
            <div>
                <label class="checkbox"><input type="checkbox" checked>Le gustaria recibir novedades de la Barberia Alura?</label>

                <input type="submit" value="Enviar Formulario" class="enviar">


            </div>


        </form>

        <table>

            <thead>
                <tr>
                    <th>Dia</th>
                    <th>Horario
                        </>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Lunes</td>
                    <td>8 hrs - 20 hrs</td>
                </tr>

                <tr>
                    <td>Miércoles</td>
                    <td>8 hrs - 20 hrs</td>
                </tr>

                <tr>
                    <td>Viernes</td>
                    <td>8 hrs - 20 hrs</td>
                </tr>


            </tbody>


        </table>

    </main>

    <footer>
        <img src="images/logo-blanco.png ">
        <p class="Copyright ">&copy Copyright Barberia Alura - 2023</p>

    </footer>
</body>
